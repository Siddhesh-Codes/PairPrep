name: Backend CI

on:
  push:
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pairprep_test
          POSTGRES_USER: pairprep
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx --workspace=api prisma generate

      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://pairprep:testpassword@localhost:5432/pairprep_test
        run: npx --workspace=api prisma db push --skip-generate

      - name: Lint
        run: npm run lint --workspace=api --if-present

      - name: Build
        run: npm run build --workspace=api

      - name: Test
        env:
          DATABASE_URL: postgresql://pairprep:testpassword@localhost:5432/pairprep_test
          JWT_SECRET: ci-test-secret-key-that-is-at-least-32-characters-long
          NODE_ENV: test
        run: npm run test --workspace=api --if-present
